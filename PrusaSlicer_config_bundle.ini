start_gcode = ; Multi-temp start code - 5 September 2020\n; Raise bed temp to profile requested bed temp\nM140 S[first_layer_bed_temperature]       ; Raise bed temp to profile requested bed temp\nM104 S185 T0                              ; Raise hot-end temp to 185C for G32 auto-calibration\nM190 S[first_layer_bed_temperature]       ; Wait for bed temp to rise\nM109 S130 T0                              ; Wait for hot-end temp to rise to 130C\nG28                                       ; home all axes\n;G29                                       ; Mesh & Level\n;G28 Z                                     ; Home Z after bed leveling FOR G29 S1\nM104 S[first_layer_temperature] T0        ; Raise hot-end temp to profile requested hot-end layer 1 temp\nM109 S[first_layer_temperature] T0        ; Wait for hot-end temp to rise to profile requested hot-end layer 1 temp\n\nG1 X0.0 Y5.0 Z1.0 F5000.0                 ; prepare to prime\nG92 E0                                    ; reset extrusion distance\n\n;Finding baby step\nG1 X100 Z0.8  F10000.0;\nG1 X0 Z0.6;\nG1 X100 Z0.4 E3.0; \n\nG4 S0.5                                   ; Pause for 1.5 seconds.\n\nG1 Z0.2 F600                              ; extra priming z\nG1 X130.0 E5.0  F1000.0                   ; priming\nG1 X160.0 E5.0  F1000.0                   ; priming\nG1 X280.0 F12000                          ; nozzle heightcheck drag\nG4 S0.5                                   ; Pause for 1.5 seconds.\nG1 X298.0 Z0.4 F400                       ; time buffer\nG92 E0                                    ; reset extrusion distance\n; end of start code\n\n\n\n\n;G1 X0.0 Y0.0 Z1.0 F3600.0                 ; prepare to prime\n;G92 E0                                    ; reset extrusion distance\n;G1 Z0.2 F600                              ; extra priming z\n;G1 X60.0 E9.0  F1000.0                    ; priming\n;G1 X125.0 E12.5  F1000.0                  ; priming\n;G1 X200.0 F15000                          ; nozzle heightcheck drag\n;G1 X250.0 Z0.4 F600                       ; time buffer\n;G92 E0                                    ; reset extrusion distance\n;end of start code
